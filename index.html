<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>rhizome.audio — Rhizome</title>
  <meta name="description" content="Rhizome: a modular audio synthesis environment. Rhizomatic. Non-hierarchical. Multiplicity.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;800&family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="grain"></div>

  <div class="rhizome">
    <div class="node node-1"></div>
    <div class="node node-2"></div>
    <div class="node node-3"></div>
    <div class="node node-4"></div>
    <div class="node node-5"></div>
    <div class="node node-6"></div>
    <div class="node node-7"></div>
    <svg class="connections" viewBox="0 0 1000 1000" preserveAspectRatio="none">
      <line class="wire wire-1" x1="200" y1="300" x2="500" y2="450" />
      <line class="wire wire-2" x1="500" y1="450" x2="800" y2="350" />
      <line class="wire wire-3" x1="300" y1="600" x2="500" y2="450" />
      <line class="wire wire-4" x1="500" y1="450" x2="700" y2="650" />
      <line class="wire wire-5" x1="150" y1="200" x2="350" y2="400" />
      <line class="wire wire-6" x1="650" y1="250" x2="800" y2="350" />
      <line class="wire wire-7" x1="700" y1="650" x2="850" y2="700" />
    </svg>
  </div>

  <main>
    <header>
      <span class="domain">rhizome.audio</span>
    </header>

    <section class="hero">
      <h1>RHIZOME</h1>
      <p class="tagline">Modular audio synthesis.<br>Rhizomatic by nature.</p>
    </section>

    <footer>
      <p class="status">
        <span class="pulse"></span>
        Signal incoming
      </p>
    </footer>
  </main>
</body>
</html>
